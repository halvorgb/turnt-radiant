name: Create Gamepack Zip

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Zip Archive
        run: zip -r turnt-radiant.zip gamepacks/

      - name: Upload Zip to Release
        # This action automatically attaches the zip to the release you just published
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') # Only runs if a tag/release triggered it
        with:
          files: turnt-radiant.zip